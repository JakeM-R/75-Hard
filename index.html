<!DOCTYPE html>
<html lang="en" class="splash-showing">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="75 Hard">
  <meta name="theme-color" content="#0E1210">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>75 Hard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Saira+Condensed:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Theme Tokens ── */
    [data-theme="hero"] {
      --bg: #1C1A14; --surface: #2A2620; --border: #252320;
      --text-primary: #E8DCC8; --text-secondary: #A89880;
      --accent: #D4B896;
      --success: #4A7C59; --success-text: #C8E8D4;
      --warning: #9C7A3C; --warning-text: #F0DCA0;
      --danger: #8B3A3A; --danger-text: #F0C0C0;
      --font-heading: 'Cinzel', 'Georgia', serif;
      --font-body: system-ui, -apple-system, sans-serif;
      --radius: 2px;
    }
    [data-theme="anime"] {
      --bg: #0D0A1A; --surface: #1A1530; --border: #2D2250;
      --text-primary: #E0D8FF; --text-secondary: #8A7FB8;
      --accent: #9B30FF;
      --success: #00C896; --success-text: #003828;
      --warning: #F0A500; --warning-text: #3A2800;
      --danger: #FF3864; --danger-text: #3A0010;
      --font-heading: 'Saira Condensed', 'Arial Narrow', sans-serif;
      --font-body: system-ui, -apple-system, sans-serif;
      --radius: 0px;
    }
    [data-theme="spark"] {
      --bg: #1A1410; --surface: #261E16; --border: #3A2A1E;
      --text-primary: #E8D8C0; --text-secondary: #9A8068;
      --accent: #9B2335;
      --success: #4E7C5F; --success-text: #C0E0CC;
      --warning: #9C6B2E; --warning-text: #F0D8A0;
      --danger: #8B2020; --danger-text: #F0C0C0;
      --font-heading: 'IM Fell English', 'Palatino Linotype', serif;
      --font-body: system-ui, -apple-system, sans-serif;
      --radius: 6px;
    }
    [data-theme="abyss"] {
      --bg: #000000; --surface: #080808; --border: #111111;
      --text-primary: #666670; --text-secondary: #333338;
      --accent: #222228;
      --success: #1A3328; --success-text: #607870;
      --warning: #3A2C10; --warning-text: #807040;
      --danger: #330E0E; --danger-text: #704040;
      --font-heading: 'Cormorant Garamond', 'Palatino Linotype', serif;
      --font-body: system-ui, -apple-system, sans-serif;
      --radius: 0px;
    }
    [data-theme="quest"] {
      --bg: #0E1210; --surface: #161C18; --border: #222C24;
      --text-primary: #D4DCD6; --text-secondary: #6A7A6C;
      --accent: #4A7358;
      --success: #3D6B4A; --success-text: #B0D8BC;
      --warning: #7A6830; --warning-text: #E0D090;
      --danger: #6B2828; --danger-text: #E0B0B0;
      --font-heading: 'Outfit', system-ui, sans-serif;
      --font-body: 'Outfit', system-ui, sans-serif;
      --radius: 4px;
    }

    /* ── Per-theme design overrides ── */

    /* Hero — parchment and stone, the weight of what came before */
    [data-theme="hero"] .setup-label,
    [data-theme="hero"] .settings-section-label,
    [data-theme="hero"] .screen-title {
      font-family: var(--font-heading);
      letter-spacing: 0.16em;
      font-size: 11px;
    }
    [data-theme="hero"] .today-day {
      font-family: var(--font-heading);
      letter-spacing: 0.04em;
    }
    [data-theme="hero"] .task-row-label {
      font-family: var(--font-heading);
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    [data-theme="hero"] .tab-bar button {
      font-family: var(--font-heading);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Anime — HUD, electric, the moment before the power shows */
    [data-theme="anime"] .task-row-label { font-weight: 600; letter-spacing: 0.02em; }
    [data-theme="anime"] .tab-bar button { text-transform: uppercase; letter-spacing: 0.1em; font-size: 9px; }
    [data-theme="anime"] .today-day {
      font-family: var(--font-heading);
      letter-spacing: -0.01em;
    }
    [data-theme="anime"] .task-checkbox { border-radius: 0; }
    [data-theme="anime"] .task-row.checked .task-checkbox {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* Spark — italic urgency, worn crimson, chaos that is secretly discipline */
    [data-theme="spark"] .today-day {
      font-family: var(--font-heading);
      font-style: italic;
      font-weight: 400;
    }
    [data-theme="spark"] .task-row-label {
      font-style: italic;
      font-family: var(--font-heading);
      font-size: 15px;
    }
    [data-theme="spark"] .today-date,
    [data-theme="spark"] .task-row-badge,
    [data-theme="spark"] .hist-date,
    [data-theme="spark"] .task-item-freq {
      font-style: italic;
      font-family: var(--font-heading);
    }

    /* Abyss — near-invisible, the act remains when the reason goes quiet */
    [data-theme="abyss"] .today-day {
      font-family: var(--font-heading);
      font-weight: 300;
      letter-spacing: 0.1em;
    }
    [data-theme="abyss"] .task-row-label {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.04em;
    }
    [data-theme="abyss"] .task-row { padding-top: 18px; padding-bottom: 18px; }
    [data-theme="abyss"] .task-row.checked .task-checkbox {
      border-color: #4A0A0A;
      color: #4A0A0A;
    }

    /* ── Splash Screen ── */
    html.splash-showing,
    html.splash-showing body { background: #000 !important; }
    #screen-splash {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 40px;
      opacity: 1; transition: opacity 0.7s ease;
    }
    #screen-splash.fade-out { opacity: 0; pointer-events: none; }
    #splash-quote {
      text-align: center;
      font-size: 28px; line-height: 1.4;
      max-width: 320px;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--surface);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screens — fixed, scroll inside ── */
    .screen {
      display: none;
      position: fixed;
      top: env(safe-area-inset-top);
      left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      padding-bottom: 58px;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ── Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: 0;
      z-index: 100;
    }
    .tab-bar button {
      flex: 1; background: none; border: none; cursor: pointer;
      padding: 8px 0 6px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--text-secondary);
      font-family: var(--font-body); font-size: 11px;
      transition: color 0.15s;
    }
    .tab-bar button.active { color: var(--text-primary); }
    .tab-bar button svg { width: 20px; height: 20px; }

    /* ── Shared ── */
    .screen-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .screen-title {
      font-family: var(--font-heading);
      font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Setup Screen ── */
    .setup-hero {
      text-align: center;
      padding: 24px 24px 20px;
    }
    .setup-hero h1 {
      font-family: var(--font-heading);
      font-size: 34px; font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .setup-hero p { color: var(--text-secondary); font-size: 14px; }

    .setup-section { padding: 0 20px 24px; }
    .setup-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 10px;
    }

    .date-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-body); font-size: 15px;
      padding: 12px 14px; border-radius: var(--radius);
      appearance: none; -webkit-appearance: none;
    }
    .date-input:focus { outline: none; border-color: var(--accent); }

    /* Task Builder */
    .freq-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
    .freq-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-secondary); font-family: var(--font-body); font-size: 12px;
      padding: 6px 12px; border-radius: var(--radius); cursor: pointer;
    }
    .freq-btn.active { border-color: var(--accent); color: var(--text-primary); }

    .weekly-stepper {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .stepper-btn {
      width: 30px; height: 30px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-primary); font-size: 18px; border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .stepper-val {
      font-size: 17px; font-family: var(--font-heading);
      color: var(--text-primary); min-width: 18px; text-align: center;
    }
    .stepper-unit { font-size: 13px; color: var(--text-secondary); }

    .task-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .task-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-body); font-size: 15px;
      padding: 11px 14px; border-radius: var(--radius);
    }
    .task-input::placeholder { color: var(--text-secondary); }
    .task-input:focus { outline: none; border-color: var(--accent); }
    .btn-add {
      background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--radius); padding: 0 16px;
      font-family: var(--font-body); font-size: 20px; font-weight: 600;
      cursor: pointer; line-height: 1;
    }

    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .task-item-label { flex: 1; font-size: 14px; }
    .task-item-freq { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
    .task-item-btns { display: flex; gap: 4px; }
    .task-item-btns button {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 14px; padding: 2px 6px;
    }
    .task-item-btns button:hover { color: var(--text-primary); }
    .btn-del { color: var(--danger) !important; }

    /* Theme selector */
    .theme-select {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-body); font-size: 15px;
      padding: 12px 14px; border-radius: var(--radius);
      appearance: none; -webkit-appearance: none; cursor: pointer;
    }

    .btn-start {
      display: block; width: calc(100% - 40px); margin: 4px 20px 40px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--radius); padding: 15px;
      font-family: var(--font-heading); font-size: 15px; font-weight: 600;
      letter-spacing: 0.08em; cursor: pointer;
    }

    /* ── Today Screen ── */
    .today-hero {
      text-align: center;
      padding: 20px 20px 12px;
      flex-shrink: 0;
    }
    .today-day {
      font-family: var(--font-heading);
      font-size: 52px; font-weight: 700;
      color: var(--text-primary); line-height: 1;
      margin-bottom: 4px;
    }
    .today-day span { font-size: 24px; color: var(--text-secondary); }
    .today-date { color: var(--text-secondary); font-size: 13px; }

    .progress-bar-wrap { padding: 0 20px 12px; flex-shrink: 0; }
    .progress-bar-track {
      height: 2px; background: var(--border); border-radius: 1px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--text-secondary); border-radius: 1px;
      transition: width 0.3s ease;
    }

    .task-rows {
      flex: 1;
      display: flex; flex-direction: column;
      padding: 0 16px;
      overflow-y: auto;
    }
    .task-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; min-height: 56px;
      -webkit-tap-highlight-color: transparent;
    }
    .task-row:last-child { border-bottom: none; }
    .task-checkbox {
      width: 22px; height: 22px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      color: transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .task-row.checked .task-checkbox {
      border-color: var(--accent);
      color: var(--accent);
    }
    .task-row.maxed .task-checkbox {
      border-color: var(--success);
      color: var(--success-text);
    }
    .task-row-content { flex: 1; min-width: 0; }
    .task-row-label { font-size: 16px; }
    .task-row.checked .task-row-label { color: var(--text-secondary); }
    .task-row.maxed .task-row-label { color: var(--text-secondary); }
    .task-row-badge { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* ── History Screen ── */
    .history-list { padding: 0 16px; }
    .hist-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .hist-row-main {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 4px; min-height: 56px;
    }
    .hist-day-num {
      font-family: var(--font-heading); font-size: 13px;
      color: var(--text-secondary); width: 44px; flex-shrink: 0;
    }
    .hist-date { flex: 1; font-size: 14px; }
    .hist-status { font-size: 16px; width: 28px; text-align: center; flex-shrink: 0; }
    .hist-detail { display: none; padding: 0 4px 14px 60px; }
    .hist-detail.open { display: block; }
    .hist-detail-item {
      font-size: 13px; padding: 2px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .hist-detail-item::before { content: '·'; color: var(--border); }

    /* ── Settings Screen ── */
    .settings-section { padding: 20px 20px 0; }
    .settings-section-label {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 12px;
    }
    .settings-divider { height: 1px; background: var(--border); margin: 20px 20px 0; }

    .btn-settings {
      display: block; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-body); font-size: 15px;
      padding: 12px 14px; border-radius: var(--radius); cursor: pointer; text-align: left;
      margin-bottom: 8px;
    }
    .btn-danger { color: var(--danger) !important; border-color: var(--danger) !important; }

    .confirm-row { display: none; gap: 8px; margin-bottom: 8px; }
    .confirm-row.open { display: flex; }
    .btn-confirm-yes {
      flex: 1; background: var(--danger); color: var(--danger-text);
      border: none; border-radius: var(--radius); padding: 12px; font-family: var(--font-body);
      font-size: 14px; cursor: pointer;
    }
    .btn-confirm-no {
      flex: 1; background: var(--surface); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 12px;
      font-family: var(--font-body); font-size: 14px; cursor: pointer;
    }

    .settings-task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .btn-save-tasks {
      background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--radius); padding: 12px 20px;
      font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body data-theme="hero">

  <!-- ══ SPLASH SCREEN ══ -->
  <div id="screen-splash"><div id="splash-quote"></div></div>

  <!-- ══ SETUP SCREEN ══ -->
  <section id="screen-setup" class="screen active">
    <div class="setup-hero">
      <h1>75 Hard</h1>
      <p>Configure your challenge</p>
    </div>

    <div class="setup-section">
      <div class="setup-label">Start Date</div>
      <input type="date" id="setup-date" class="date-input">
    </div>

    <div class="setup-section">
      <div class="setup-label">Tasks</div>
      <div class="freq-toggle" id="setup-freq-toggle">
        <button class="freq-btn active" data-freq="daily">Daily</button>
        <button class="freq-btn" data-freq="weekly">Weekly</button>
      </div>
      <div class="weekly-stepper" id="setup-weekly-stepper" style="display:none">
        <button class="stepper-btn" id="setup-stepper-minus">−</button>
        <span class="stepper-val" id="setup-stepper-val">3</span>
        <span class="stepper-unit">× per week</span>
        <button class="stepper-btn" id="setup-stepper-plus">+</button>
      </div>
      <div class="task-add-row">
        <input type="text" id="setup-task-input" class="task-input" placeholder="Add a task…">
        <button class="btn-add" id="setup-task-add">+</button>
      </div>
      <div class="task-list" id="setup-task-list"></div>
    </div>

    <button class="btn-start" id="btn-start">Start the 75</button>
  </section>

  <!-- ══ TODAY SCREEN ══ -->
  <section id="screen-today" class="screen">
    <div class="today-hero">
      <div class="today-day" id="today-day-num">Day <span id="today-x">1</span></div>
      <div class="today-date" id="today-date"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="today-progress" style="width:0%"></div>
      </div>
    </div>
    <div class="task-rows" id="today-task-rows"></div>
  </section>

  <!-- ══ HISTORY SCREEN ══ -->
  <section id="screen-history" class="screen">
    <div class="screen-header">
      <div class="screen-title">History</div>
    </div>
    <div class="history-list" id="history-list"></div>
  </section>

  <!-- ══ SETTINGS SCREEN ══ -->
  <section id="screen-settings" class="screen">
    <div class="screen-header">
      <div class="screen-title">Settings</div>
    </div>

    <div class="settings-section">
      <div class="settings-section-label">Theme</div>
      <select id="settings-theme-select" class="theme-select"></select>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section">
      <div class="settings-section-label">Tasks</div>
      <div class="settings-task-list" id="settings-task-list"></div>
      <div class="freq-toggle" id="settings-freq-toggle">
        <button class="freq-btn active" data-freq="daily">Daily</button>
        <button class="freq-btn" data-freq="weekly">Weekly</button>
      </div>
      <div class="weekly-stepper" id="settings-weekly-stepper" style="display:none">
        <button class="stepper-btn" id="settings-stepper-minus">−</button>
        <span class="stepper-val" id="settings-stepper-val">3</span>
        <span class="stepper-unit">× per week</span>
        <button class="stepper-btn" id="settings-stepper-plus">+</button>
      </div>
      <div class="task-add-row">
        <input type="text" id="settings-task-input" class="task-input" placeholder="Add a task…">
        <button class="btn-add" id="settings-task-add">+</button>
      </div>
      <button class="btn-save-tasks" id="btn-save-tasks">Save Tasks</button>
    </div>

    <div class="settings-divider"></div>

    <div class="settings-section" style="padding-bottom: 32px;">
      <div class="settings-section-label">Data</div>
      <button class="btn-settings" id="btn-export">Export Log (JSON)</button>
      <button class="btn-settings btn-danger" id="btn-delete">Delete Challenge</button>
      <div class="confirm-row" id="confirm-delete-row">
        <button class="btn-confirm-no" id="btn-delete-no">Cancel</button>
        <button class="btn-confirm-yes" id="btn-delete-yes">Yes, delete everything</button>
      </div>
      <button class="btn-settings btn-danger" id="btn-reset">Reset Challenge</button>
      <div class="confirm-row" id="confirm-row">
        <button class="btn-confirm-no" id="btn-confirm-no">Cancel</button>
        <button class="btn-confirm-yes" id="btn-confirm-yes">Yes, reset everything</button>
      </div>
    </div>
  </section>

  <!-- ══ TAB BAR ══ -->
  <nav class="tab-bar" id="tab-bar" style="display:none">
    <button data-screen="today" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Today
    </button>
    <button data-screen="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      History
    </button>
    <button data-screen="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
  </nav>

  <script>
    // ── Storage ──
    const CONFIG_KEY = '75hard_config';
    const LOG_KEY    = '75hard_log';
    function loadConfig() { try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch { return null; } }
    function saveConfig(c) { localStorage.setItem(CONFIG_KEY, JSON.stringify(c)); }
    function loadLog()    { try { return JSON.parse(localStorage.getItem(LOG_KEY)) || {}; } catch { return {}; } }
    function saveLog(l)   { localStorage.setItem(LOG_KEY, JSON.stringify(l)); }

    // ── Utilities ──
    function uid() { return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
    function todayKey() { return new Date().toISOString().slice(0, 10); }
    function dateKey(d) { return d.toISOString().slice(0, 10); }

    function getDayNumber(startDate) {
      return Math.floor((new Date() - new Date(startDate)) / 86400000) + 1;
    }

    function formatDate(isoStr) {
      return new Date(isoStr + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function getWeekStart(date) {
      const d = new Date(date);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function getWeeklyDone(taskId, log, referenceDate) {
      const start = getWeekStart(referenceDate || new Date());
      let count = 0;
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        const key = dateKey(d);
        if (log[key]?.completed?.includes(taskId)) count++;
      }
      return count;
    }

    function isWeekly(task) {
      return task.days && typeof task.days === 'object' && task.days.weekly;
    }

    // ── Theme ──
    const THEMES = [
      { id: 'hero',  name: 'Hero'  },
      { id: 'anime', name: 'Anime' },
      { id: 'spark', name: 'Spark' },
      { id: 'abyss', name: 'Abyss' },
    ];

    function applyTheme(id) { document.body.dataset.theme = id; }

    function buildThemeSelect(currentTheme) {
      const sel = document.getElementById('settings-theme-select');
      sel.innerHTML = THEMES.map(t =>
        `<option value="${t.id}"${t.id === currentTheme ? ' selected' : ''}>${t.name}</option>`
      ).join('');
      sel.addEventListener('change', () => {
        const c = loadConfig(); c.theme = sel.value; saveConfig(c);
        applyTheme(sel.value);
      });
    }

    // ── Splash ──
    const QUOTES = [
      { text: 'Arise',          color: '#7B4FD4', font: "'Cinzel', Georgia, serif",              italic: false },
      { text: 'Nevermore',      color: '#8C1A2A', font: "'Cormorant Garamond', Palatino, serif", italic: false },
      { text: 'You must change your life',
                                color: '#E8D8C0', font: "'IM Fell English', Palatino, serif",    italic: true  },
      { text: 'But I must… I must… I must! Away with this weakness!',
                                color: '#E8D8C0', font: "'IM Fell English', Palatino, serif",    italic: true  },
    ];

    function showSplash() {
      const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      const el = document.getElementById('splash-quote');
      el.textContent = q.text;
      el.style.color = q.color;
      el.style.fontFamily = q.font;
      el.style.fontStyle = q.italic ? 'italic' : 'normal';
      const splash = document.getElementById('screen-splash');
      setTimeout(() => {
        splash.classList.add('fade-out');
        setTimeout(() => { splash.remove(); document.documentElement.classList.remove('splash-showing'); }, 700);
      }, 2300);
    }

    // ── Navigation ──
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
      document.querySelectorAll('.tab-bar button').forEach(b => {
        b.classList.toggle('active', b.dataset.screen === id);
      });
      if (id === 'today')    renderToday();
      if (id === 'history')  renderHistory();
      if (id === 'settings') renderSettings();
    }

    // ── SETUP SCREEN ──
    let setupTasks = [];
    let setupFreq  = 'daily';
    let setupWeeklyCount = 3;

    function initSetup() {
      document.getElementById('setup-date').value = todayKey();

      setupTasks = [
        { id: uid(), label: 'Drink 1 gallon water', days: 'daily' },
        { id: uid(), label: 'Outdoor workout (45 min)', days: 'daily' },
        { id: uid(), label: 'Read 10 pages', days: 'daily' },
        { id: uid(), label: 'Follow a diet', days: 'daily' },
        { id: uid(), label: 'No alcohol', days: 'daily' },
      ];
      renderSetupTasks();

      document.querySelectorAll('#setup-freq-toggle .freq-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          setupFreq = btn.dataset.freq;
          document.querySelectorAll('#setup-freq-toggle .freq-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('setup-weekly-stepper').style.display = setupFreq === 'weekly' ? 'flex' : 'none';
        });
      });

      document.getElementById('setup-stepper-minus').addEventListener('click', () => {
        if (setupWeeklyCount > 1) { setupWeeklyCount--; document.getElementById('setup-stepper-val').textContent = setupWeeklyCount; }
      });
      document.getElementById('setup-stepper-plus').addEventListener('click', () => {
        if (setupWeeklyCount < 6) { setupWeeklyCount++; document.getElementById('setup-stepper-val').textContent = setupWeeklyCount; }
      });

      const taskInput = document.getElementById('setup-task-input');
      document.getElementById('setup-task-add').addEventListener('click', () => addSetupTask(taskInput));
      taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSetupTask(taskInput); });

      document.getElementById('btn-start').addEventListener('click', startChallenge);
    }

    function addSetupTask(input) {
      const label = input.value.trim();
      if (!label) return;
      const days = setupFreq === 'daily' ? 'daily' : { weekly: setupWeeklyCount };
      setupTasks.push({ id: uid(), label, days });
      input.value = '';
      renderSetupTasks();
    }

    function renderSetupTasks() {
      const list = document.getElementById('setup-task-list');
      list.innerHTML = '';
      setupTasks.forEach((t, i) => {
        const freqLabel = t.days === 'daily' ? 'Daily' : t.days.weekly + '×/wk';
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `
          <span class="task-item-label">${t.label}</span>
          <span class="task-item-freq">${freqLabel}</span>
          <div class="task-item-btns">
            <button onclick="moveSetupTask(${i},-1)">↑</button>
            <button onclick="moveSetupTask(${i},1)">↓</button>
            <button class="btn-del" onclick="deleteSetupTask(${i})">✕</button>
          </div>`;
        list.appendChild(item);
      });
    }

    function moveSetupTask(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= setupTasks.length) return;
      [setupTasks[i], setupTasks[j]] = [setupTasks[j], setupTasks[i]];
      renderSetupTasks();
    }

    function deleteSetupTask(i) { setupTasks.splice(i, 1); renderSetupTasks(); }

    function startChallenge() {
      const startDate = document.getElementById('setup-date').value;
      if (!startDate || setupTasks.length === 0) return;
      const config = { startDate, theme: 'quest', tasks: setupTasks };
      saveConfig(config);
      document.getElementById('tab-bar').style.display = 'flex';
      showScreen('today');
    }

    // ── TODAY SCREEN ──
    function renderToday() {
      const config = loadConfig();
      if (!config) return;

      const dayNum = getDayNumber(config.startDate);
      const isComplete = dayNum > 75;

      document.getElementById('today-x').textContent = isComplete ? '75' : dayNum;
      document.getElementById('today-date').textContent = formatDate(todayKey());

      if (isComplete) {
        document.getElementById('today-day-num').innerHTML = '<span style="font-size:24px">Challenge Complete</span>';
      }

      const log = loadLog();
      const entry = log[todayKey()] || { completed: [], photoTaken: false };
      const dailyTasks = config.tasks.filter(t => t.days === 'daily');
      const rows = document.getElementById('today-task-rows');
      rows.innerHTML = '';

      config.tasks.forEach(task => {
        const checked = entry.completed.includes(task.id);
        const row = document.createElement('div');

        if (isWeekly(task)) {
          const done = getWeeklyDone(task.id, log);
          const target = task.days.weekly;
          const maxed = done >= target;
          row.className = 'task-row' + (checked ? ' checked' : '') + (maxed && !checked ? ' maxed' : '');
          row.innerHTML = `
            <div class="task-checkbox">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 6.5 5.5 10 11 3"/>
              </svg>
            </div>
            <div class="task-row-content">
              <div class="task-row-label">${task.label}</div>
              <div class="task-row-badge">${done} / ${target} this week</div>
            </div>`;
        } else {
          row.className = 'task-row' + (checked ? ' checked' : '');
          row.innerHTML = `
            <div class="task-checkbox">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 6.5 5.5 10 11 3"/>
              </svg>
            </div>
            <div class="task-row-content"><div class="task-row-label">${task.label}</div></div>`;
        }

        if (!isComplete) {
          row.addEventListener('click', () => {
            const l = loadLog();
            const key = todayKey();
            if (!l[key]) l[key] = { completed: [], photoTaken: false };
            const idx = l[key].completed.indexOf(task.id);
            if (idx === -1) l[key].completed.push(task.id);
            else l[key].completed.splice(idx, 1);
            saveLog(l);
            renderToday();
          });
        }
        rows.appendChild(row);
      });

      // Progress: daily tasks only
      const total = dailyTasks.length;
      const done = dailyTasks.filter(t => entry.completed.includes(t.id)).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('today-progress').style.width = pct + '%';
    }

    // ── HISTORY SCREEN ──
    function renderHistory() {
      const config = loadConfig();
      if (!config) return;
      const log = loadLog();
      const list = document.getElementById('history-list');
      list.innerHTML = '';

      const start = new Date(config.startDate + 'T00:00:00');
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const dates = [];
      for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) dates.push(new Date(d));
      dates.reverse();

      const taskMap = {};
      config.tasks.forEach(t => { taskMap[t.id] = t; });

      dates.forEach(d => {
        const key = dateKey(d);
        const dayNum = Math.min(Math.floor((d - start) / 86400000) + 1, 75);
        const entry = log[key] || { completed: [], photoTaken: false };
        const dailyTasks = config.tasks.filter(t => t.days === 'daily');
        const isPast = d < today;

        const totalDaily = dailyTasks.length + 1;
        const doneDaily = dailyTasks.filter(t => (entry.completed || []).includes(t.id)).length + (entry.photoTaken ? 1 : 0);

        let statusIcon, statusColor;
        if (doneDaily === totalDaily && totalDaily > 1) {
          statusIcon = '✓'; statusColor = 'var(--success-text)';
        } else if (doneDaily > 0) {
          statusIcon = '◑'; statusColor = 'var(--warning-text)';
        } else if (isPast) {
          statusIcon = '✗'; statusColor = 'var(--danger-text)';
        } else {
          statusIcon = '—'; statusColor = 'var(--text-secondary)';
        }

        const row = document.createElement('div');
        row.className = 'hist-row';

        const detail = document.createElement('div');
        detail.className = 'hist-detail';

        config.tasks.forEach(t => {
          const checked = (entry.completed || []).includes(t.id);
          const item = document.createElement('div');
          item.className = 'hist-detail-item';
          item.style.color = checked ? 'var(--text-primary)' : 'var(--text-secondary)';
          if (isWeekly(t)) {
            const weeklyDone = getWeeklyDone(t.id, log, d);
            item.innerHTML = `<span>${t.label} — ${weeklyDone} / ${t.days.weekly} this week</span>`;
          } else {
            item.innerHTML = `<span>${t.label}</span>`;
          }
          detail.appendChild(item);
        });

        const photoItem = document.createElement('div');
        photoItem.className = 'hist-detail-item';
        photoItem.style.color = entry.photoTaken ? 'var(--text-primary)' : 'var(--text-secondary)';
        photoItem.innerHTML = `<span>Progress photo</span>`;
        detail.appendChild(photoItem);

        row.innerHTML = `
          <div class="hist-row-main">
            <div class="hist-day-num">Day ${dayNum}</div>
            <div class="hist-date">${formatDate(key)}</div>
            <div class="hist-status" style="color:${statusColor}">${statusIcon}</div>
          </div>`;
        row.appendChild(detail);
        row.querySelector('.hist-row-main').addEventListener('click', () => detail.classList.toggle('open'));
        list.appendChild(row);
      });
    }

    // ── SETTINGS SCREEN ──
    let settingsTasks = [];
    let settingsFreq  = 'daily';
    let settingsWeeklyCount = 3;

    function renderSettings() {
      const config = loadConfig();
      if (!config) return;

      settingsTasks = config.tasks.map(t => ({ ...t }));
      settingsFreq = 'daily';
      settingsWeeklyCount = 3;

      buildThemeSelect(config.theme);

      document.getElementById('settings-weekly-stepper').style.display = 'none';
      document.getElementById('settings-stepper-val').textContent = 3;
      document.querySelectorAll('#settings-freq-toggle .freq-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.freq === 'daily');
      });

      renderSettingsTasks();
    }

    function renderSettingsTasks() {
      const list = document.getElementById('settings-task-list');
      list.innerHTML = '';
      settingsTasks.forEach((t, i) => {
        const freqLabel = t.days === 'daily' ? 'Daily' : t.days.weekly + '×/wk';
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `
          <span class="task-item-label">${t.label}</span>
          <span class="task-item-freq">${freqLabel}</span>
          <div class="task-item-btns">
            <button onclick="moveSettingsTask(${i},-1)">↑</button>
            <button onclick="moveSettingsTask(${i},1)">↓</button>
            <button class="btn-del" onclick="deleteSettingsTask(${i})">✕</button>
          </div>`;
        list.appendChild(item);
      });
    }

    function moveSettingsTask(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= settingsTasks.length) return;
      [settingsTasks[i], settingsTasks[j]] = [settingsTasks[j], settingsTasks[i]];
      renderSettingsTasks();
    }

    function deleteSettingsTask(i) { settingsTasks.splice(i, 1); renderSettingsTasks(); }

    // Wire up settings (once)
    document.querySelectorAll('#settings-freq-toggle .freq-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        settingsFreq = btn.dataset.freq;
        document.querySelectorAll('#settings-freq-toggle .freq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('settings-weekly-stepper').style.display = settingsFreq === 'weekly' ? 'flex' : 'none';
      });
    });

    document.getElementById('settings-stepper-minus').addEventListener('click', () => {
      if (settingsWeeklyCount > 1) { settingsWeeklyCount--; document.getElementById('settings-stepper-val').textContent = settingsWeeklyCount; }
    });
    document.getElementById('settings-stepper-plus').addEventListener('click', () => {
      if (settingsWeeklyCount < 6) { settingsWeeklyCount++; document.getElementById('settings-stepper-val').textContent = settingsWeeklyCount; }
    });

    const settingsTaskInput = document.getElementById('settings-task-input');
    document.getElementById('settings-task-add').addEventListener('click', () => addSettingsTask(settingsTaskInput));
    settingsTaskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSettingsTask(settingsTaskInput); });

    function addSettingsTask(input) {
      const label = input.value.trim();
      if (!label) return;
      const days = settingsFreq === 'daily' ? 'daily' : { weekly: settingsWeeklyCount };
      settingsTasks.push({ id: uid(), label, days });
      input.value = '';
      renderSettingsTasks();
    }

    document.getElementById('btn-save-tasks').addEventListener('click', () => {
      const config = loadConfig();
      config.tasks = settingsTasks;
      saveConfig(config);
      const btn = document.getElementById('btn-save-tasks');
      btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.textContent = 'Save Tasks'; }, 1500);
    });

    document.getElementById('btn-delete').addEventListener('click', () => {
      document.getElementById('confirm-delete-row').classList.add('open');
    });
    document.getElementById('btn-delete-no').addEventListener('click', () => {
      document.getElementById('confirm-delete-row').classList.remove('open');
    });
    document.getElementById('btn-delete-yes').addEventListener('click', () => {
      localStorage.removeItem(CONFIG_KEY);
      localStorage.removeItem(LOG_KEY);
      document.body.dataset.theme = 'hero';
      document.getElementById('tab-bar').style.display = 'none';
      document.getElementById('confirm-delete-row').classList.remove('open');
      initSetup();
      showScreen('setup');
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(loadLog(), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '75hard-log.json';
      a.click();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      document.getElementById('confirm-row').classList.add('open');
    });
    document.getElementById('btn-confirm-no').addEventListener('click', () => {
      document.getElementById('confirm-row').classList.remove('open');
    });
    document.getElementById('btn-confirm-yes').addEventListener('click', () => {
      const config = loadConfig();
      config.startDate = todayKey();
      saveConfig(config);
      saveLog({});
      document.getElementById('confirm-row').classList.remove('open');
      showScreen('today');
    });

    // Tab bar
    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => showScreen(btn.dataset.screen));
    });

    // ── Init ──
    (function init() {
      showSplash();
      let config = loadConfig();
      if (config) {
        // Migrate old specific-day arrays to weekly count
        let changed = false;
        config.tasks = config.tasks.map(t => {
          if (Array.isArray(t.days)) { changed = true; return { ...t, days: { weekly: t.days.length || 3 } }; }
          return t;
        });
        if (changed) saveConfig(config);
        // Migrate quest theme to hero
        if (!config.theme || config.theme === 'quest') { config.theme = 'hero'; saveConfig(config); }
        applyTheme(config.theme);
        document.getElementById('tab-bar').style.display = 'flex';
        showScreen('today');
      } else {
        initSetup();
        document.getElementById('tab-bar').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
